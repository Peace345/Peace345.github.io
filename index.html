<!DOCTYPE html>
<html>
<head>
  <title>Yandhi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* container */
.container {
  width: 340px;
  text-align: center;
}

/* album cover (slightly more “solid”) */
.cover {
  width: 230px;
  height: 230px;
  border-radius: 18px;
  object-fit: cover;
  box-shadow: 0 12px 35px rgba(0,0,0,0.75);
}

/* album text */
.album {
  margin-top: 12px;
  font-size: 15px;
  font-weight: 500;
  opacity: 0.6;
  letter-spacing: 0.5px;
}

/* title + artist (thicker) */
.title {
  margin-top: 10px;
  font-size: 20px;
  font-weight: 600;
}

.artist {
  font-size: 14px;
  opacity: 0.7;
  margin-top: 6px;
  font-weight: 500;
}

/* song list (thicker + more presence) */
.song {
  margin-top: 14px;
  font-size: 15px;
  font-weight: 500;
  opacity: 0.75;
  cursor: pointer;
  transition: 0.2s;
}

.song:hover {
  opacity: 1;
}

.active {
  opacity: 1;
  text-decoration: underline;
}

/* player box (heavier UI feel) */
.player {
  margin-top: 22px;
  background: #151515;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid #222;
}

/* progress bar thicker */
.bar {
  width: 100%;
  height: 5px;
  background: #2a2a2a;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 12px;
}

.progress {
  height: 100%;
  width: 0%;
  background: white;
}

/* controls */
.controls {
  margin-top: 12px;
}

button {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
  font-size: 18px;
  opacity: 0.8;
  margin: 0 12px;
  font-weight: 600;
}

button:hover {
  opacity: 1;
}

  </style>
</head>

<body>

  <div class="container">

    <!-- COVER (same for all songs) -->
    <img id="cover" class="cover" src="cover.jpg">

    <div class="album">Yandhi</div>

    <div class="title" id="title">Select a song</div>
    <div class="artist" id="artist">—</div>

    <!-- hidden audio player -->
    <audio id="audio"></audio>

    <!-- player UI -->
    <div class="player">
      <div class="bar">
        <div class="progress" id="progress"></div>
      </div>

      <div class="controls">
        <button onclick="prev()">⏮</button>
        <button onclick="togglePlay()" id="playBtn">▶</button>
        <button onclick="next()">⏭</button>
      </div>
    </div>

    <!-- song list -->
    <div class="song" onclick="playSong(0)">Chakras</div>
    <div class="song" onclick="playSong(1)">Calm Before The Storm</div>
    <div class="song" onclick="playSong(2)">The Storm</div>
    <div class="song" onclick="playSong(3)">Spread Your Wings</div>

  </div>

 <script>
  const audio = document.getElementById("audio");
  const title = document.getElementById("title");
  const artist = document.getElementById("artist");
  const progress = document.getElementById("progress");
  const playBtn = document.getElementById("playBtn");
  const songs = document.querySelectorAll(".song");

  let current = 0;
  let playing = false;

  // -----------------------------
  // YANDHI ALBUM DATA
  // -----------------------------
  const playlist = [
    {
      file: "song1.mp3",
      title: "Chakras",
      artist: "Kanye West",
      features: []
    },
    {
      file: "song2.mp3",
      title: "Calm Before The Storm",
      artist: "Kanye West",
      features: ["Ty Dolla $ign"]
    },
    {
      file: "song3.mp3",
      title: "The Storm",
      artist: "Kanye West",
      features: ["Ty Dolla $ign", "Kid Cudi", "XXXTENTACION"]
    },
    {
      file: "song4.mp3",
      title: "Spread Your Wings",
      artist: "Kanye West",
      features: []
    }
  ];

  // -----------------------------
  // LOAD SONG
  // -----------------------------
  function loadSong(i) {
    const s = playlist[i];

    audio.src = s.file;
    title.innerText = s.title;

    // format features cleanly
    if (s.features.length > 0) {
      artist.innerText = `${s.artist} (feat. ${s.features.join(", ")})`;
    } else {
      artist.innerText = s.artist;
    }

    highlight(i);
    updateMediaSession(s);
  }

  // -----------------------------
  // PLAY SONG
  // -----------------------------
  function playSong(i) {
    current = i;
    loadSong(i);

    audio.play();
    playing = true;
    playBtn.innerText = "⏸";
  }

  // -----------------------------
  // TOGGLE PLAY
  // -----------------------------
  function togglePlay() {
    if (!audio.src) return;

    if (playing) {
      audio.pause();
      playBtn.innerText = "▶";
    } else {
      audio.play();
      playBtn.innerText = "⏸";
    }

    playing = !playing;
  }

  // -----------------------------
  // NEXT / PREV
  // -----------------------------
  function next() {
    current = (current + 1) % playlist.length;
    playSong(current);
  }

  function prev() {
    current = (current - 1 + playlist.length) % playlist.length;
    playSong(current);
  }

  // -----------------------------
  // HIGHLIGHT SONG
  // -----------------------------
  function highlight(i) {
    songs.forEach(s => s.classList.remove("active"));
    if (songs[i]) songs[i].classList.add("active");
  }

  // -----------------------------
  // PROGRESS BAR
  // -----------------------------
  audio.addEventListener("timeupdate", () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progress.style.width = pct + "%";
  });

  audio.addEventListener("ended", next);

  // -----------------------------
  // MEDIA SESSION (LOCK SCREEN)
  // -----------------------------
  function updateMediaSession(song) {
    if (!('mediaSession' in navigator)) return;

    navigator.mediaSession.metadata = new MediaMetadata({
      title: song.title,
      artist: artist.innerText,
      album: "Yandhi",
      artwork: [
        { src: "cover.jpg", sizes: "512x512", type: "image/jpg" }
      ]
    });

    navigator.mediaSession.setActionHandler("play", () => {
      audio.play();
      playing = true;
      playBtn.innerText = "⏸";
    });

    navigator.mediaSession.setActionHandler("pause", () => {
      audio.pause();
      playing = false;
      playBtn.innerText = "▶";
    });

    navigator.mediaSession.setActionHandler("previoustrack", prev);
    navigator.mediaSession.setActionHandler("nexttrack", next);
  }

   function updateMediaSession(song) {
  if (!('mediaSession' in navigator)) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title: song.title,
    artist: artist.innerText,
    album: "Yandhi",
    artwork: [
      { src: "cover.jpg", sizes: "512x512", type: "image/jpg" }
    ]
  });

  navigator.mediaSession.setActionHandler("play", () => {
    audio.play();
    playing = true;
    playBtn.innerText = "⏸";
  });

  navigator.mediaSession.setActionHandler("pause", () => {
    audio.pause();
    playing = false;
    playBtn.innerText = "▶";
  });

  navigator.mediaSession.setActionHandler("previoustrack", prev);
  navigator.mediaSession.setActionHandler("nexttrack", next);
}
</script>

</body>
</html>
