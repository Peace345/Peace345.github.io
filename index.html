<!DOCTYPE html>
<html>
<head>
  <title>Yandhi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 320px;
      text-align: center;
    }

    .cover {
      width: 220px;
      height: 220px;
      border-radius: 15px;
      object-fit: cover;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .album {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.4;
    }

    .title {
      margin-top: 10px;
      font-size: 18px;
    }

    .artist {
      font-size: 13px;
      opacity: 0.5;
      margin-top: 5px;
    }

    .song {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.6;
      cursor: pointer;
      transition: 0.2s;
    }

    .song:hover {
      opacity: 1;
    }

    .active {
      opacity: 1;
      text-decoration: underline;
    }

    .player {
      margin-top: 20px;
      background: #111;
      padding: 12px;
      border-radius: 12px;
    }

    .bar {
      width: 100%;
      height: 3px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: white;
    }

    .controls {
      margin-top: 10px;
    }

    button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 16px;
      opacity: 0.7;
      margin: 0 10px;
    }

    button:hover {
      opacity: 1;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- COVER (same for all songs) -->
    <img id="cover" class="cover" src="cover.jpg">

    <div class="album">Yandhi</div>

    <div class="title" id="title">Select a song</div>
    <div class="artist" id="artist">—</div>

    <!-- hidden audio player -->
    <audio id="audio"></audio>

    <!-- player UI -->
    <div class="player">
      <div class="bar">
        <div class="progress" id="progress"></div>
      </div>

      <div class="controls">
        <button onclick="prev()">⏮</button>
        <button onclick="togglePlay()" id="playBtn">▶</button>
        <button onclick="next()">⏭</button>
      </div>
    </div>

    <!-- song list -->
    <div class="song" onclick="playSong(0)">Chakras</div>
    <div class="song" onclick="playSong(1)">Calm Before The Storm</div>
    <div class="song" onclick="playSong(2)">Track 3</div>

  </div>

  <script>
    const audio = document.getElementById("audio");
    const title = document.getElementById("title");
    const artist = document.getElementById("artist");
    const progress = document.getElementById("progress");
    const playBtn = document.getElementById("playBtn");
    const songs = document.querySelectorAll(".song");

    const playlist = [
      { file: "song1.mp3", title: "Chakras", artist: "Artist A (feat. B)" },
      { file: "song2.mp3", title: "Calm Before The Storm", artist: "Artist C" },
      { file: "song3.mp3", title: "Track 3", artist: "Artist D" }
    ];

    let current = 0;
    let playing = false;

    function loadSong(i) {
      const s = playlist[i];

      audio.src = s.file;
      title.innerText = s.title;
      artist.innerText = s.artist;

      highlight(i);
    }

    function playSong(i) {
      current = i;
      loadSong(i);
      audio.play();
      playing = true;
      playBtn.innerText = "⏸";
    }

    function togglePlay() {
      if (!audio.src) return;

      if (playing) {
        audio.pause();
        playBtn.innerText = "▶";
      } else {
        audio.play();
        playBtn.innerText = "⏸";
      }

      playing = !playing;
    }

    function next() {
      current = (current + 1) % playlist.length;
      playSong(current);
    }

    function prev() {
      current = (current - 1 + playlist.length) % playlist.length;
      playSong(current);
    }

    function highlight(i) {
      songs.forEach(s => s.classList.remove("active"));
      if (songs[i]) songs[i].classList.add("active");
    }

    audio.addEventListener("timeupdate", () => {
      const pct = (audio.currentTime / audio.duration) * 100;
      progress.style.width = pct + "%";
    });

    audio.addEventListener("ended", next);
  </script>

</body>
</html>
